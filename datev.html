<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP SPORTS | DATEV Master-Onboarding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --ts-yellow: #f9b233; }
        body { font-family: 'Inter', sans-serif; background-color: #0f0f0f; color: white; }
        
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 1rem; margin-bottom: 1.5rem; }
        .section-label { background: #252525; padding: 0.8rem 1.25rem; font-size: 11px; font-weight: 900; text-transform: uppercase; color: var(--ts-yellow); border-radius: 1rem 1rem 0 0; }
        .input-box { padding: 1.25rem; }
        
        input, select { background: #0f0f0f; border: 1px solid #333; border-radius: 0.5rem; color: white; padding: 0.6rem; width: 100%; font-size: 0.85rem; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--ts-yellow); }
        input.invalid { border-color: #ef4444 !important; background-color: rgba(239, 68, 68, 0.05); }
        
        label { font-size: 10px; color: #888; text-transform: uppercase; font-weight: bold; display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
        .tooltip-icon { background: #333; color: var(--ts-yellow); width: 14px; height: 14px; border-radius: 50%; display: inline-flex; items-center; justify-content: center; font-size: 9px; cursor: help; font-weight: bold; }

        #sig-canvas { background: white; border: 2px dashed #444; border-radius: 0.5rem; cursor: crosshair; width: 100%; height: 180px; }
        .hidden { display: none; }
        .warn-text { color: #ef4444; font-size: 11px; margin-top: 8px; font-weight: bold; line-height: 1.4; }

        @media print {
            @page { size: A4; margin: 10mm; }
            body { background: white !important; color: black !important; padding: 0; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .p-header { border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
            .p-section { border: 1px solid #000; margin-bottom: 10px; overflow: hidden; }
            .p-section-head { background: #f0f0f0; color: #000; padding: 4px 10px; font-size: 10px; font-weight: bold; text-transform: uppercase; border-bottom: 1px solid #000; }
            .p-grid { display: grid; grid-template-columns: 1fr 1fr; }
            .p-field { border-right: 1px solid #000; padding: 5px 10px; border-bottom: 1px solid #000; }
            .p-field:last-child { border-right: none; }
            .p-label { font-size: 7px; text-transform: uppercase; color: #333; font-weight: bold; margin-bottom: 2px; }
            .p-val { font-size: 10px; font-weight: 700; min-height: 14px; }
            .signature-image { max-height: 80px; display: block; margin: 0 0 0 auto; }
            .sig-box { text-align: right; font-size: 8px; width: 250px; margin: 40px 0 0 auto; }
            .p-notice { font-size: 9px; line-height: 1.4; padding: 10px; background: #f9f9f9; border: 1px solid #ddd; margin-top: 10px; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto no-print">
        <div class="flex items-center gap-4 mb-8">
            <div class="w-12 h-12 bg-[#f9b233] rounded-xl flex items-center justify-center font-black text-black italic text-2xl border-2 border-black">TS</div>
            <h1 class="text-2xl font-black uppercase italic tracking-tighter">DATEV Onboarding v10.0</h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="card">
                <div class="section-label italic">01. Identität & Kontakt</div>
                <div class="input-box space-y-3">
                    <div class="grid grid-cols-2 gap-2">
                        <div><label>Vorname</label><input type="text" id="in_vn"></div>
                        <div><label>Nachname</label><input type="text" id="in_nn"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div><label>Geburtsdatum</label><input type="text" id="in_geb" placeholder="TT.MM.JJJJ"></div>
                        <div>
                            <label>Geschlecht</label>
                            <select id="in_sex">
                                <option value="männlich">männlich</option>
                                <option value="weiblich">weiblich</option>
                                <option value="divers">divers</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div><label>E-Mail</label><input type="email" id="in_mail"></div>
                        <div><label>Mobilnummer</label><input type="tel" id="in_tel"></div>
                    </div>
                    <div><label>Straße & Hausnummer</label><input type="text" id="in_str"></div>
                    <div class="grid grid-cols-3 gap-2">
                        <div class="col-span-1"><label>PLZ</label><input type="text" id="in_plz"></div>
                        <div class="col-span-2"><label>Ort</label><input type="text" id="in_ort"></div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="section-label italic">02. Finanzen & Qualifikation</div>
                <div class="input-box space-y-3">
                    <div><label>SV-Nummer <span class="tooltip-icon" title="Sozialversicherungsausweis">?</span></label><input type="text" id="in_sv"></div>
                    <div><label>Steuer-ID</label><input type="text" id="in_stid" maxlength="11" oninput="valNum(this, 11)"></div>
                    <div><label>Krankenkasse</label><input type="text" id="in_kasse"></div>
                    <div class="grid grid-cols-2 gap-2">
                        <div><label>IBAN</label><input type="text" id="in_iban" oninput="valIban(this)"></div>
                        <div><label>Bank Name</label><input type="text" id="in_bank"></div>
                    </div>
                    <div>
                        <label>Bildungsabschluss</label>
                        <select id="in_bildung">
                            <option value="Abitur / Fachabitur">Abitur / Fachabitur</option>
                            <option value="Abgeschlossene Ausbildung">Abgeschlossene Ausbildung</option>
                            <option value="Hochschulabschluss">Hochschulabschluss</option>
                            <option value="Realschulabschluss">Realschulabschluss</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="section-label italic">03. Beschäftigung</div>
            <div class="input-box">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div><label>Standort</label><select id="in_loc"><option value="Echterdingen">Echterdingen</option><option value="Reutlingen">Reutlingen</option><option value="Leinfelden">Leinfelden</option><option value="Kornwestheim">Kornwestheim</option><option value="Nürtingen">Nürtingen</option><option value="Degerloch">Degerloch</option><option value="Zentrale">Zentrale</option></select></div>
                    <div><label>Anstellung</label><select id="in_type" onchange="checkMinijob(this.value)"><option value="Festangestellt">Festangestellt</option><option value="Minijob">Minijob</option><option value="Dualer Student">Dualer Student</option></select></div>
                    <div><label>Eintritt</label><input type="text" id="in_entry" placeholder="TT.MM.JJJJ"></div>
                    <div><label>Wochenstunden</label><input type="text" id="in_h"></div>
                </div>
                <div id="minijob_fields" class="hidden mt-6 pt-6 border-t border-[#333]">
                    <label>Weiterer Minijob?</label>
                    <select id="in_minijob_check" onchange="checkWarning(this.value)"><option value="Nein">Nein</option><option value="Ja">Ja</option></select>
                    <div id="minijob_warning" class="hidden warn-text">⚠️ WICHTIG: Zusammenrechnung bei über 538 €!</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="section-label italic">04. Digitale Signatur</div>
            <div class="p-5">
                <canvas id="sig-canvas"></canvas>
                <div class="flex gap-2 mt-3">
                    <button onclick="clearSig()" class="px-4 py-2 bg-gray-800 text-xs rounded uppercase font-bold">Löschen</button>
                </div>
            </div>
        </div>

        <button onclick="generatePDF()" class="w-full py-6 bg-[#f9b233] text-black font-black uppercase italic rounded-xl shadow-xl active:scale-95 transition-all mb-20">PDF generieren 📄</button>
    </div>

    <div id="print_area" class="print-only mx-auto" style="max-width: 800px; color: black;"></div>

    <script>
        const canvas = document.getElementById('sig-canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        function resizeCanvas() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
        window.onload = resizeCanvas;
        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
        canvas.addEventListener('mousemove', (e) => { if (!drawing) return; const rect = canvas.getBoundingClientRect(); ctx.lineWidth = 2; ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top); ctx.stroke(); });

        function clearSig() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
        function valNum(el, len) { el.value = el.value.replace(/\D/g, ''); el.classList.toggle('invalid', el.value.length !== len); }
        function valIban(el) { el.value = el.value.replace(/\s/g, '').toUpperCase(); el.classList.toggle('invalid', !/^DE\d{20}$/.test(el.value)); }
        function checkMinijob(val) { document.getElementById('minijob_fields').classList.toggle('hidden', val !== 'Minijob'); }
        function checkWarning(val) { document.getElementById('minijob_warning').classList.toggle('hidden', val !== 'Ja'); }

        function generatePDF() {
            const val = (id) => document.getElementById(id).value || "---";
            const sigImgData = canvas.toDataURL(); // Immer aktuelle Daten nehmen
            const today = new Date().toLocaleDateString('de-DE');

            let html = `
                <div class="p-header">
                    <div><p style="font-weight:900; font-size:18px;">PERSONALFRAGEBOGEN</p><p style="font-size:9px;">DATEV-Erfassung</p></div>
                    <p style="font-weight:900; font-size:14px;">TOP SPORTS - ${val('in_loc')}</p>
                </div>
                <div class="p-section">
                    <div class="p-section-head">Angaben zum Arbeitnehmer</div>
                    <div class="p-grid">
                        <div class="p-field"><p class="p-label">Name, Vorname</p><p class="p-val">${val('in_nn')}, ${val('in_vn')}</p></div>
                        <div class="p-field"><p class="p-label">Geschlecht / Geburtsdatum</p><p class="p-val">${val('in_sex')} / ${val('in_geb')}</p></div>
                        <div class="p-field" style="grid-column: span 2;"><p class="p-label">Anschrift</p><p class="p-val">${val('in_str')}, ${val('in_plz')} ${val('in_ort')}</p></div>
                        <div class="p-field"><p class="p-label">E-Mail</p><p class="p-val">${val('in_mail')}</p></div>
                        <div class="p-field"><p class="p-label">Mobil</p><p class="p-val">${val('in_tel')}</p></div>
                        <div class="p-field"><p class="p-label">SV-Nummer</p><p class="p-val">${val('in_sv')}</p></div>
                        <div class="p-field"><p class="p-label">Steuer-ID</p><p class="p-val">${val('in_stid')}</p></div>
                    </div>
                </div>
                <div class="p-section">
                    <div class="p-section-head">Bank / Kasse / Bildung</div>
                    <div class="p-grid">
                        <div class="p-field"><p class="p-label">Krankenkasse</p><p class="p-val">${val('in_kasse')}</p></div>
                        <div class="p-field"><p class="p-label">Bildungsabschluss</p><p class="p-val">${val('in_bildung')}</p></div>
                        <div class="p-field" style="grid-column: span 2;"><p class="p-label">IBAN / Bank</p><p class="p-val">${val('in_iban')} (${val('in_bank')})</p></div>
                    </div>
                </div>
                <div class="p-section">
                    <div class="p-section-head">Beschäftigung</div>
                    <div class="p-grid">
                        <div class="p-field"><p class="p-label">Eintritt</p><p class="p-val">${val('in_entry')}</p></div>
                        <div class="p-field"><p class="p-label">Art / Std.</p><p class="p-val">${val('in_type')} (${val('in_h')} h)</p></div>
                    </div>
                </div>`;

            if (val('in_type') === 'Minijob') {
                html += `<div class="p-notice">Weiterer Minijob: <strong>${val('in_minijob_check')}</strong>. Bei Überschreiten der 538€ Grenze tritt SV-Pflicht ein.</div>`;
            }

            html += `
                <div class="sig-box">
                    <img src="${sigImgData}" class="signature-image">
                    <p style="border-top:1px solid #000; padding-top:4px; font-weight:bold;">${today}, Unterschrift Mitarbeiter</p>
                </div>`;

            document.getElementById('print_area').innerHTML = html;
            setTimeout(() => { window.print(); }, 300);
        }
    </script>
</body>
</html>
