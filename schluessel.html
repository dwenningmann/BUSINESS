<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP SPORTS | Schlüsselprotokoll</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --ts-yellow: #f9b233; }
        body { font-family: 'Inter', sans-serif; background-color: #0f0f0f; color: white; }
        
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 1rem; margin-bottom: 1.5rem; }
        .section-label { background: #252525; padding: 0.8rem 1.25rem; font-size: 11px; font-weight: 900; text-transform: uppercase; color: var(--ts-yellow); border-radius: 1rem 1rem 0 0; }
        .input-box { padding: 1.25rem; }
        
        input { background: #0f0f0f; border: 1px solid #333; border-radius: 0.5rem; color: white; padding: 0.6rem; width: 100%; font-size: 0.85rem; outline: none; }
        input:focus { border-color: var(--ts-yellow); }
        label { font-size: 10px; color: #888; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 4px; }

        @media print {
            @page { size: A4; margin: 15mm; }
            body { background: white !important; color: black !important; padding: 0; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            
            .p-header { border-bottom: 3px solid #000; padding-bottom: 10px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
            .p-title { font-size: 18pt; font-weight: 900; text-transform: uppercase; }
            
            .p-box { border: 1px solid #000; padding: 15px; margin-bottom: 20px; }
            .p-label { font-size: 8px; text-transform: uppercase; color: #555; font-weight: bold; margin-bottom: 2px; }
            .p-val { font-size: 12px; font-weight: 700; border-bottom: 1px solid #ccc; min-height: 18px; margin-bottom: 10px; }
            
            .rule-list { font-size: 10.5px; line-height: 1.6; margin: 25px 0; }
            .rule-list li { margin-bottom: 8px; list-style-type: disc; margin-left: 20px; }
            
            .sig-section { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 30px; }
            .sig-box { border-top: 1px solid #000; padding-top: 5px; font-size: 9px; font-weight: bold; text-align: center; }
            .return-area { margin-top: 50px; border: 2px dashed #ccc; padding: 20px; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-3xl mx-auto no-print">
        <div class="flex items-center gap-4 mb-8">
            <div class="w-12 h-12 bg-[#f9b233] rounded-xl flex items-center justify-center font-black text-black italic text-2xl border-2 border-black">TS</div>
            <h1 class="text-2xl font-black uppercase italic tracking-tighter">Schlüsselübergabe</h1>
        </div>

        <div class="card">
            <div class="section-label italic">Protokoll-Details</div>
            <div class="input-box space-y-4">
                <div><label>Empfänger (Mitarbeiter)</label><input type="text" id="in_name"></div>
                <div><label>Gebäude / Standort</label><input type="text" id="in_loc"></div>
                <div><label>Schlüssel-Bezeichnung / Nummer</label><input type="text" id="in_key"></div>
                <div><label>Bemerkung</label><input type="text" id="in_note" placeholder="z.B. Transponder + Spindschlüssel"></div>
            </div>
        </div>

        <button onclick="generatePrint()" class="w-full py-6 bg-[#f9b233] text-black font-black uppercase italic rounded-xl shadow-xl active:scale-95 transition-all">
            Protokoll generieren 📄
        </button>
    </div>

    <div id="print_area" class="print-only mx-auto" style="max-width: 800px; color: black;"></div>

    <script>
        function generatePrint() {
            const val = (id) => document.getElementById(id).value || "____________________";
            const today = new Date().toLocaleDateString('de-DE');

            const html = `
                <div class="p-header">
                    <div class="p-title">Schlüsselübergabeprotokoll</div>
                    <div style="text-align:right"><p style="font-weight:900; font-size:12pt;">TOP SPORTS</p><p style="font-size:8px;">FITNESS CLUBS</p></div>
                </div>

                <p style="font-size:11px; margin-bottom:20px;">Hiermit bestätigt der Empfänger den Erhalt der/des folgenden Schlüssel(s):</p>

                <div class="p-box">
                    <p class="p-label">Empfänger</p><p class="p-val">${val('in_name')}</p>
                    <p class="p-label">Gebäude / Standort</p><p class="p-val">${val('in_loc')}</p>
                    <p class="p-label">Schlüssel / Transponder</p><p class="p-val">${val('in_key')}</p>
                    <p class="p-label">Bemerkung</p><p class="p-val">${val('in_note')}</p>
                </div>

                <div style="font-weight:bold; font-size:12px; text-transform:uppercase; margin-bottom:10px;">Schlüsselverwahrung</div>
                <ul class="rule-list">
                    <li>Der/die Empfänger/in von Schlüsseln ist für die sichere Aufbewahrung verantwortlich. Er/Sie übernimmt die Haftung für den Gebrauch der erhaltenen Schlüssel und trägt die Folgen, die sich aus einem Verlust ergeben.</li>
                    <li>Jegliche Weitergabe von Schlüsseln an Dritte ist untersagt.</li>
                    <li>Kosten, die durch Beschädigung oder Verlust dieser Schlüssel entstehen (z.B. Austausch der Schließanlage), gehen zu Lasten des Schlusselempfängers.</li>
                    <li>Eine Schlüsselversicherung wird ausdrücklich empfohlen.</li>
                </ul>

                <div class="sig-section">
                    <div>
                        <div style="height:40px"></div>
                        <div class="sig-box">${today}, Unterschrift Schlüsselgeber</div>
                    </div>
                    <div>
                        <div style="height:40px"></div>
                        <div class="sig-box">${today}, Unterschrift Schlüsselempfänger</div>
                    </div>
                </div>

                <div class="return-area">
                    <p style="font-weight:900; font-size:10px; text-transform:uppercase; margin-bottom:15px;">Schlüsselrückgabe (nur bei Austritt ausfüllen)</p>
                    <div class="sig-section" style="margin-top:10px;">
                        <div class="sig-box">Datum Schlüssel Rückgabe</div>
                        <div class="sig-box">Unterschrift Schlüsselrücknahme</div>
                    </div>
                </div>
            `;
            document.getElementById('print_area').innerHTML = html;
            window.print();
        }
    </script>
</body>
</html>
