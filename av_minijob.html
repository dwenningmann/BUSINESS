<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP SPORTS | AV-Erstellung PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --ts-yellow: #f9b233; }
        body { font-family: 'Inter', sans-serif; background-color: #0f0f0f; color: white; }
        
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 1rem; margin-bottom: 1.5rem; }
        .section-label { background: #252525; padding: 0.8rem 1.25rem; font-size: 11px; font-weight: 900; text-transform: uppercase; color: var(--ts-yellow); border-radius: 1rem 1rem 0 0; }
        .input-box { padding: 1.25rem; }
        
        input, select { background: #0f0f0f; border: 1px solid #333; border-radius: 0.5rem; color: white; padding: 0.6rem; width: 100%; font-size: 0.85rem; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--ts-yellow); }
        label { font-size: 10px; color: #888; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 4px; }
        #sig-canvas { background: white; border: 2px dashed #444; border-radius: 0.5rem; cursor: crosshair; width: 100%; height: 140px; }

        @media print {
            @page { size: A4; margin: 15mm 20mm; }
            body { background: white !important; color: black !important; padding: 0; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            
            .av-text { font-size: 10.5px; line-height: 1.6; text-align: justify; color: black; }
            .av-header { border-bottom: 3px solid #000; padding-bottom: 10px; margin-bottom: 25px; font-weight: 900; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; }
            .para-block { margin-bottom: 12px; }
            .para-num { font-weight: 900; color: #000; }
            
            .sig-area { display: flex; justify-content: space-between; margin-top: 50px; page-break-inside: avoid; }
            .sig-box-print { width: 45%; font-size: 9px; text-align: right; display: flex; flex-direction: column; align-items: flex-end; }
            .signature-image { max-height: 80px; display: block; margin-bottom: 5px; }
            .sig-label { font-weight: bold; margin-top: 5px; border-top: 1px solid transparent; }
            
            .receipt-box { margin-top: 40px; padding: 20px; border: 1.5px solid #000; page-break-inside: avoid; border-radius: 5px; }
            strong { font-weight: 700; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto no-print">
        <div class="flex items-center gap-4 mb-8">
            <div class="w-12 h-12 bg-[#f9b233] rounded-xl flex items-center justify-center font-black text-black italic text-2xl border-2 border-black">TS</div>
            <h1 class="text-2xl font-black uppercase italic tracking-tighter text-white">AV-Generator (Minijob 603€)</h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="card">
                <div class="section-label italic">01. Mitarbeiterdaten</div>
                <div class="input-box space-y-3">
                    <div><label>Name Mitarbeiter</label><input type="text" id="in_name" placeholder="Vorname Nachname"></div>
                    <div><label>Anschrift</label><input type="text" id="in_adr" placeholder="Straße, PLZ Ort"></div>
                    <div>
                        <label>Einsatzort</label>
                        <select id="in_loc">
                            <option value="Echterdingen">Echterdingen</option>
                            <option value="Reutlingen">Reutlingen</option>
                            <option value="Leinfelden">Leinfelden</option>
                            <option value="Kornwestheim">Kornwestheim</option>
                            <option value="Nürtingen">Nürtingen</option>
                            <option value="Degerloch">Degerloch</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="section-label italic">02. Vertragskonditionen</div>
                <div class="input-box space-y-3">
                    <div><label>Beginn</label><input type="text" id="in_start" placeholder="TT.MM.JJJJ"></div>
                    <div>
                        <label>Tätigkeit</label>
                        <select id="in_job">
                            <option value="Fitnesscoach / Servicekraft">Fitnesscoach / Servicekraft</option>
                            <option value="Kursleiter">Kursleiter</option>
                            <option value="Reinigungskraft">Reinigungskraft</option>
                        </select>
                    </div>
                    <div><label>Stundenlohn (€)</label><input type="text" id="in_lohn" value="13,90"></div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="section-label italic">03. Digitale Unterschrift Studioleiter</div>
            <div class="p-5">
                <canvas id="sig-canvas"></canvas>
                <button onclick="clearSig()" class="mt-3 px-4 py-2 bg-gray-800 text-xs rounded uppercase font-bold text-white">Löschen</button>
            </div>
        </div>

        <button onclick="generateAV()" class="w-full py-6 bg-[#f9b233] text-black font-black uppercase italic rounded-xl shadow-xl active:scale-95 transition-all mb-20">
            Vertrag generieren & Drucken 📄
        </button>
    </div>

    <div id="print_area" class="print-only mx-auto av-text"></div>

    <script>
        const canvas = document.getElementById('sig-canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        function resizeCanvas() { 
            const ratio = window.devicePixelRatio || 1;
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            ctx.scale(ratio, ratio);
        }
        window.onload = resizeCanvas;
        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
        canvas.addEventListener('mousemove', (e) => { 
            if (!drawing) return; 
            const rect = canvas.getBoundingClientRect(); 
            ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.strokeStyle = 'black';
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top); ctx.stroke(); 
        });

        function clearSig() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        function generateAV() {
            const val = (id) => document.getElementById(id).value || "____________________";
            const sigImg = canvas.toDataURL();
            const today = new Date().toLocaleDateString('de-DE');

            const html = `
                <div class="av-header">Arbeitsvertrag für geringfügig entlohnte Beschäftigte</div>
                
                <p class="para-block">Zwischen der <strong>TOP SPORTS Fitness GmbH & Co. KG</strong>, Storlachstraße 1, 72760 Reutlingen 
                - nachfolgend „Arbeitgeber“ genannt - und Herrn/Frau <strong>${val('in_name')}</strong>, wohnhaft in ${val('in_adr')} 
                - nachfolgend „Arbeitnehmer“ genannt - wird folgender Vertrag geschlossen:</p>

                <div class="para-block"><span class="para-num">§ 1 Beginn & § 2 Tätigkeit:</span> Das Arbeitsverhältnis beginnt am <strong>${val('in_start')}</strong>. Der Arbeitnehmer wird als <strong>${val('in_job')}</strong> am Standort <strong>${val('in_loc')}</strong> eingestellt. Der Arbeitgeber behält sich vor, den Aufgabenbereich oder Einsatzort bei Bedarf anzupassen.</div>

                <div class="para-block"><span class="para-num">§ 3 Arbeitszeit & Schulungen:</span> (1) Die Arbeitszeit richtet sich nach Aufwand, max. <strong>43,3 Stunden</strong> pro Monat. (2) Arbeitnehmer verpflichtet sich zur regelmäßigen Arbeit am Wochenende sowie zur Teilnahme an Personalschulungen.</div>

                <div class="para-block"><span class="para-num">§ 4 Vergütung & Benefits:</span> (1) Stundenlohn: <strong>${val('in_lohn')} €</strong>. (2) Zahlung erfolgt bargeldlos zum Monatsende. (3) RV-Befreiung gemäß § 6 Abs. 1b SGB VI möglich. (4) Ab 3. Monat kostenloser PREMIUM-Zutritt zu allen Clubs bei regelmäßiger Leistung und Schichtbereitschaft.</div>

                <div class="para-block"><span class="para-num">§ 5 Arbeitsverhinderung & Krankmeldung:</span> Verhinderung ist unverzüglich vor Dienstbeginn anzuzeigen. Ab dem 3. Kalendertag der Krankheit ist eine ärztliche Bescheinigung vorzulegen.</div>

                <div class="para-block"><span class="para-num">§ 6 Verschwiegenheit & § 7 Nebenbeschäftigung:</span> Stillschweigen über betriebliche Belange ist Pflicht. Weitere Beschäftigungen sind unverzüglich schriftlich anzuzeigen.</div>

                <div class="para-block"><span class="para-num">§ 8 Kündigung & § 9 Sonstiges:</span> Das Verhältnis ist unbefristet. Kündigung bedarf der Schriftform. Änderungen bedürfen der Textform.</div>

                <div class="sig-area">
                    <div class="sig-box-print" style="text-align:left; align-items:flex-start;">
                        <img src="${sigImg}" class="signature-image">
                        <p class="sig-label">Unterschrift Arbeitgeber (Studioleitung)</p>
                    </div>
                    <div class="sig-box-print">
                        <div style="height:80px"></div>
                        <p class="sig-label">${val('in_loc')}, den __________, Unterschrift Arbeitnehmer</p>
                    </div>
                </div>

                <div class="receipt-box">
                    <p><strong>Empfangsbestätigung:</strong></p>
                    <p>Der Arbeitnehmer bestätigt hiermit den Erhalt einer Kopie dieses Vertrages.</p>
                    <div class="sig-area" style="margin-top:20px;">
                        <div class="sig-box-print" style="text-align:left; align-items:flex-start;">
                            <p>Datum: ${today}</p>
                        </div>
                        <div class="sig-box-print">
                            <div style="height:60px"></div>
                            <p class="sig-label">Unterschrift Arbeitnehmer</p>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('print_area').innerHTML = html;
            setTimeout(() => { window.print(); }, 300);
        }
    </script>
</body>
</html>
